# docker-compose.prod.yml (prod overrides)
services:
  nutfesmap-database:
    env_file: services/nutfesmap-api/config/.env.prod         # ← prod用

  nutfesmap-migrate:
    env_file: services/nutfesmap-api/config/.env.prod         # ← prod用

  nutfesmap-api:
    env_file: services/nutfesmap-api/config/.env.prod         # ← prod用
    environment:
      CORS_ALLOW_ORIGINS: "https://app.navifes.com"
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: "None"
    restart: unless-stopped

  nutfesmap-web:
    build:
      context: ./services/nutfesmap-web
      dockerfile: Dockerfile
      target: prod                                            # ← prodステージ
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL} # ← root .env.prod
    env_file: services/nutfesmap-web/.env.prod                # ← prod用（ランタイム）
    environment:
      NODE_ENV: "production"
    ports: ["3000:3000"]
    volumes: []                                               # ← 本番はマウントしない
    command: npm run start -- -H 0.0.0.0
    depends_on:
      - nutfesmap-api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2025.8.0
    container_name: cloudflared
    depends_on:
      - nutfesmap-web
      - nutfesmap-api
    volumes:
      - ./services/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./services/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: unless-stopped

