        yNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: "画像左上(0,0)〜右下(1,1)の正規化Y座標"
          example: 0.742
        category:
          type: string
          enum: ["food","stage","exhibition","game","service","other"]
          example: "food"
        status:
          type: string
          enum: ["open","paused","closed"]
          default: "open"
          example: "open"
        waitMinutes:
          type: integer
          minimum: 0
          default: 0
          example: 20
        createdAt:
          type: string
          format: date-time
          example: "2025-09-29T04:00:00Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2025-09-29T05:00:00Z"

