openapi: 3.1.0
info:
  title: "nutfesmap 技大祭マップ API"
  version: "0.7.1"
  description: |
    技大祭マップサービスAPI（Auth / Users / Maps / Floors / Pins）

    ■ 設計方針（DB優先）
    - `maps` は **1行=1マップ=一意の `id`（PK）**。
    - 「同じMAP IDで全階を扱う」は、**root（親）Mapの `id` をグループID** として用い、
      各階の `parent_map_id` に **rootの `id`** を格納（各階自身の `id` はユニーク）。
        - 例）root: id=`map_123`、各階は `parent_map_id=map_123` を共有。
    - ルート（親なし）一覧は `/maps/index`。
    - 単体の Map は `/maps/{mapId}` で取得・更新。
    - **フロア（階）スタックの取得は `/maps/{mapId}/floors`**（`mapId` は root でも floor でも可）。
    - **階の追加は `/maps/{mapId}/floors`（POST）**、**階の削除は `/maps/{mapId}/floors/{floorIndex}`（DELETE）**。
    - ETag は `ID` と `ModifiedAt`（または階ごとの `ModifiedAt`）から生成し、主要レスポンスに付与。

servers:
  - url: "http://localhost:8080"
    description: "ローカル開発用サーバ"
  - url: "http://localhost:8080/api"
    description: "/api プレフィックス構成"

tags:
  - name: "Auth"
    description: "認証関連API"
  - name: "Users"
    description: "ユーザー管理API"
  - name: "Maps"
    description: "地図メタ／階（フロア）スタック操作"
  - name: "Pins"
    description: "ピン（正規化座標）"

paths:
  # ───────────── Auth ─────────────
  /auth/login:
    post:
      tags: ["Auth"]
      summary: "ユーザーログイン"
      description: |
        ユーザーを認証し、アクセスJWTを返却。リフレッシュトークンは HttpOnly Cookie `rt` に設定。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: "認証成功"
          headers:
            Set-Cookie:
              description: "HttpOnly refresh token cookie (rt)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/refresh:
    post:
      tags: ["Auth"]
      summary: "アクセストークン再発行"
      description: "有効なRT Cookieを用いてATを再発行し、RTもローテーションする。"
      responses:
        "200":
          description: "再発行成功"
          headers:
            Set-Cookie:
              description: "Rotated HttpOnly refresh token cookie (rt)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "ログアウト"
      description: "RTを無効化し、Cookieを削除する。"
      responses:
        "204":
          description: "ログアウト成功（No Content）"
          headers:
            Set-Cookie:
              description: "クリアされたリフレッシュトークンCookie"
              schema: { type: string }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/csrf:
    get:
      tags: ["Auth"]
      summary: "CSRFトークン取得"
      responses:
        "200":
          description: "取得成功（CSRF有効時）"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsrfResponse" }
        "204":
          description: "CSRF無効時（No Content）"
        "500": { $ref: "#/components/responses/ServerError" }

  # ───────────── Users ─────────────
  /users/register:
    post:
      tags: ["Users"]
      summary: "ユーザー登録"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreateRequest" }
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/me:
    get:
      tags: ["Users"]
      summary: "自分のユーザー情報取得"
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/{id}:
    get:
      tags: ["Users"]
      summary: "ユーザー情報取得"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/update/{id}:
    put:
      tags: ["Users"]
      summary: "ユーザー情報更新"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserUpdateRequest" }
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/delete/{id}:
    delete:
      tags: ["Users"]
      summary: "ユーザー削除"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: "削除成功" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  # ───────────── Maps（Index） ─────────────
  /maps/index:
    get:
      tags: ["Maps"]
      summary: "Index Map取得（親なしMapのみ＝root）"
      description: "parentMapId が null の Map（root）一覧。"
      responses:
        "200":
          description: "取得成功"
          headers:
            ETag:
              description: "インデックスリストのETag（If-None-Match で条件付き GET 可）"
              schema: { type: string, example: 'W/"8dfcd278e0..."' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MapResponse" }

  # ───────────── Maps（作成） ─────────────
  /maps:
    post:
      tags: ["Maps"]
      summary: "マップ作成（root または floor）"
      description: |
        - `parentMapId=null` で **root** を作成。
        - `parentMapId=<rootId>` で **floor** を1つ追加（空のマップ）。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MapCreateRequest" }
      responses:
        "201":
          description: "作成成功（単体Map）"
          headers:
            ETag:
              description: "作成されたMapのETag"
              schema: { type: string, example: 'W/"a1b2c3..."' }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  # ───────────── Maps（取得／更新／削除） ─────────────
  /maps/{mapId}:
    get:
      tags: ["Maps"]
      summary: "マップ取得（単体Map）"
      description: "単一の Map を返す。子メタ情報（children, childrenCount）を含む。"
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "取得成功（単体Map）"
          headers:
            ETag:
              description: "単体MapのETag"
              schema: { type: string, example: 'W/"d4e5f6..."' }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    patch:
      tags: ["Maps"]
      summary: "マップ部分更新（単体Map）"
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MapUpdateRequest" }
      responses:
        "200":
          description: "更新成功（単体Map）"
          headers:
            ETag:
              description: "更新後MapのETag"
              schema: { type: string, example: 'W/"eeaa99..."' }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    delete:
      tags: ["Maps"]
      summary: "マップ削除（再帰）"
      description: |
        指定 `mapId` の単体Mapを削除。  
        root を削除した場合は、その `parent_map_id=root.id` の全floorも合わせて削除（CASCADE相当）。  
        floor を削除した場合は、root の `floor_count` を -1、0 なら `has_floors=false`。
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      responses:
        "204": { description: "削除成功（No Content）" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  # ───────────── Floors（追加／最上階削除／スタック取得） ─────────────
  /maps/{mapId}/floors:
    post:
      tags: ["Maps"]
      summary: "階追加（空の階を1つ追加）"
      description: |
        パスの `{mapId}` を親（root）として、空の階を1つ作成する。  
        リクエストボディは省略可（実装では未使用）。互換のため `MapCreateRequest` を受け付けてもよい。
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MapCreateRequest" }
      responses:
        "201":
          description: "作成成功（作成された階の単体Map）"
          headers:
            ETag:
              description: "作成された階（Map）のETag"
              schema: { type: string, example: 'W/"112233..."' }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    get:
      tags: ["Maps"]
      summary: "階スタック取得（1F..順）"
      description: |
        指定IDが root でも floor でも受け取り、所属 root の全フロアを 1F.. の順で返す。
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "取得成功（階スタック）"
          headers:
            ETag:
              description: "rootID と各階の最終更新から作るETag"
              schema: { type: string, example: 'W/"778899..."' }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FloorStackResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/{mapId}/floors/{floorIndex}:
    delete:
      tags: ["Maps"]
      summary: "階削除（最上階のみ削除可）"
      description: |
        - `floorIndex` は **1..floor_count**。  
        - **現在の `floor_count` と同じ（= 最上階）** ときのみ削除可。  
        - 削除後は root の `floor_count` を -1、0 なら `has_floors=false`。
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
        - in: path
          name: floorIndex
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: "削除成功（No Content）" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  # ───────────── Pins（※元の仕様を保持） ─────────────
  /maps/{mapId}/pins:
    get:
      tags: ["Pins"]
      summary: "指定Mapのピン一覧（単一Mapに属するピン）"
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PinResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    post:
      tags: ["Pins"]
      summary: "ピン作成（単一Mapに紐づけ）"
      parameters:
        - in: path
          name: mapId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinCreateRequest" }
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /pins/{pinId}:
    get:
      tags: ["Pins"]
      summary: "ピン詳細取得"
      parameters:
        - in: path
          name: pinId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    patch:
      tags: ["Pins"]
      summary: "ピン更新"
      parameters:
        - in: path
          name: pinId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinUpdateRequest" }
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

    delete:
      tags: ["Pins"]
      summary: "ピン削除"
      parameters:
        - in: path
          name: pinId
          required: true
          schema: { type: string }
      responses:
        "204": { description: "削除成功" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

components:
  securitySchemes:
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: "JWT"
    RefreshCookie:
      type: apiKey
      in: cookie
      name: "rt"
    CsrfToken:
      type: apiKey
      in: header
      name: "X-CSRF-Token"

  responses:
    BadRequest:
      description: "入力値不正"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    UnauthorizedError:
      description: "認証情報不正"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ForbiddenError:
      description: "権限不足"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: "競合（例: 最上階以外の削除）"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: "対象が存在しない"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ServerError:
      description: "サーバ内部エラー"
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    # ── 共通 ──
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "validation error"

    CsrfResponse:
      type: object
      required: [csrf_token]
      properties:
        csrf_token:
          type: string
          example: "f02c9d2a-8f6e-4a7e-9f7b-2e8b9c8a2aa1"

    # ── Auth ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: "kitano"
        password:
          type: string
          format: password
          example: "Passw0rd!123"

    TokenResponse:
      type: object
      required: [access_token, access_expires_at]
      properties:
        access_token:
          type: string
          description: "アクセスJWT"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        access_expires_at:
          type: string
          format: date-time
          example: "2025-10-01T00:00:00Z"

    # ── Users ──
    UserCreateRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "kitano"
        email:
          type: string
          format: email
          example: "kitano@example.com"
        displayName:
          type: string
          maxLength: 100
          example: "北野 正樹"
        password:
          type: string
          format: password
          example: "Passw0rd!123"

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "kitano+new@example.com"
        displayName:
          type: string
          maxLength: 100
          example: "北野 まさき"
        password:
          type: string
          format: password
          example: "N3wPassw0rd!456"

    UserResponse:
      type: object
      required: [id, username, email, createdAt, modifiedAt]
      properties:
        id:
          type: string
          example: "user_01ABCDEF"
        username:
          type: string
          example: "kitano"
        email:
          type: string
          example: "kitano@example.com"
        displayName:
          type: string
          example: "北野 正樹"
        createdAt:
          type: string
          format: date-time
          example: "2025-09-01T12:00:00Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2025-09-15T09:30:00Z"

    # ── Maps/Floors ──
    MapResponse:
      type: object
      required:
        [ id, name, imageData, naturalWidth, naturalHeight,
          hasFloors, floorCount, createdAt, modifiedAt ]
      properties:
        id:
          type: string
          example: "map_123"
        name:
          type: string
          example: "講義棟エリア（root または floor）"
        imageData:
          type: string
          format: byte
          nullable: true
          description: "背景画像のbase64"
          example: null
        naturalWidth:
          type: integer
          minimum: 0
          example: 4096
        naturalHeight:
          type: integer
          minimum: 0
          example: 3072
        parentMapId:
          type: string
          nullable: true
          description: "rootはnull、floorはroot.id（=同じMAP IDグループ）"
          example: null
        hasFloors:
          type: boolean
          description: "root 側の集約フラグ（floor では false が一般的）"
          example: true
        floorCount:
          type: integer
          minimum: 0
          description: "root 側の集約値"
          example: 3
        childrenCount:
          type: integer
          minimum: 0
          description: "子（直下の floor）件数（root のみ意味がある）"
          example: 2
        children:
          type: array
          description: "子（直下の floor）の軽量リスト"
          items:
            type: object
            required: [id, name, hasFloors, floorCount]
            properties:
              id:
                type: string
                example: "floor_1"
              name:
                type: string
                example: "1F"
              hasFloors:
                type: boolean
                example: false
              floorCount:
                type: integer
                example: 0
        createdAt:
          type: string
          format: date-time
          example: "2025-09-01T00:00:00Z"
        modifiedAt:
          type: string
          format: date-time
          example: "2025-09-20T10:00:00Z"

    MapCreateRequest:
      type: object
      required: [parentMapId]
      properties:
        parentMapId:
          type: string
          nullable: true
          description: "nullならroot作成。root.idを指定すると“空の階”を1つ作成（親IDはroot.id）"
          example: null

    MapUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: "講義棟エリア（更新）"
        imageData:
          type: string
          format: byte
          example: null
        naturalWidth:
          type: integer
          minimum: 0
          example: 5000
        naturalHeight:
          type: integer
          minimum: 0
          example: 3500
        parentMapId:
          type: string
          nullable: true
          example: "root_123"

    FloorItem:
      type: object
      required: [floorIndex, map]
      properties:
        floorIndex:
          type: integer
          minimum: 1
          description: "1=1F..作成時刻昇順で連番付与"
          example: 2
        map:
          $ref: "#/components/schemas/MapResponse"

    FloorStackResponse:
      type: object
      required: [rootMapId, rootName, floorCount, items]
      properties:
        rootMapId:
          type: string
          example: "map_123"
        rootName:
          type: string
          example: "講義棟エリア"
        floorCount:
          type: integer
          minimum: 0
          example: 3
        items:
          type: array
          description: "1F..最上階（必要に応じ、UI側でrootも別枠表示可）"
          items: { $ref: "#/components/schemas/FloorItem" }

    FloorCreateResult:
      type: object
      required: [created, stack]
      properties:
        created:
          $ref: "#/components/schemas/FloorItem"
        stack:
          $ref: "#/components/schemas/FloorStackResponse"

    # ── Pins ──
    PinResponse:
      type: object
      required:
        [ id, mapId, name, xNorm, yNorm, category, status, waitMinutes, createdAt, modifiedAt ]
      properties:
        id:
          type: string
          example: "pin_01J0AABCDE"
        mapId:
          type: string
          example: "map_123"
        name:
          type: string
          example: "ラーメン研究会"
        description:
          type: string
          example: "自家製スープの限定提供"
        descriptionImageData:
          type: string
          format: byte
          nullable: true
          example: null
        type:
          type: string
          enum: ["area_selector","exhibit","service","info"]
          default: "exhibit"
          example: "exhibit"
        linkToMapId:
          type: string
          nullable: true
          description: "type=area_selector の場合に遷移先Map ID"
          example: null
        xNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: "画像左上(0,0)〜右下(1,1)の正規化X座標"
