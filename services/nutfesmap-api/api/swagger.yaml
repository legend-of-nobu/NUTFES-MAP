openapi: 3.1.0
info:
  title: "nutfesmap 技大祭マップ API"
  version: "0.4.0"
  description: |
    技大祭マップサービスAPI。
    認証は「アクセスJWT(Authorizationヘッダ)」＋「リフレッシュトークン(HttpOnly Cookie: rt)」の二段構成。
    変更系エンドポイントでは CSRF トークン（X-CSRF-Token ヘッダ）を要求します。

servers:
  - url: "http://localhost:8080"
    description: "ローカル開発用サーバ"
  - url: "http://localhost:8080/api"
    description: "/api プレフィックスを付ける構成の場合（必要に応じてパスも合わせる）"

tags:
  - name: "Auth"
    description: "認証関連API"
  - name: "Users"
    description: "ユーザー関連API"
  - name: "Maps"
    description: "地図（背景画像メタ／階層: campus→area→floor）関連API"
  - name: "Pins"
    description: "地図上のピン（企画・エリア選択など）関連API"
  - name: "Tickets"
    description: "整理券（発行/状態管理）関連API"
  - name: "Realtime"
    description: "待ち時間のリアルタイム配信（SSE）"

paths:
  /auth/login:
    post:
      tags: ["Auth"]
      summary: "ユーザーログイン"
      description: |
        ユーザーを認証し、アクセスJWTを返却。リフレッシュトークンは HttpOnly Cookie `rt` に設定されます。
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "認証成功"
          headers:
            Set-Cookie:
              description: "HttpOnly refresh token cookie (rt)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/refresh:
    post:
      tags: ["Auth"]
      summary: "アクセストークン再発行"
      description: |
        有効なリフレッシュトークンCookieを用いてアクセストークンを再発行し、リフレッシュトークンもローテーションします。
      security:
        - RefreshCookie: []
        - CsrfToken: []
      responses:
        "200":
          description: "再発行成功"
          headers:
            Set-Cookie:
              description: "Rotated HttpOnly refresh token cookie (rt)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "ログアウト"
      description: "リフレッシュトークンを無効化し、Cookieを削除します。"
      security:
        - RefreshCookie: []
        - CsrfToken: []
      responses:
        "204":
          description: "ログアウト成功（No Content）"
          headers:
            Set-Cookie:
              description: "クリアされたリフレッシュトークンCookie"
              schema:
                type: string
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/csrf:
    get:
      tags: ["Auth"]
      summary: "CSRFトークン取得"
      description: "CSRFトークンを返却し、必要に応じてCookieにも設定します。"
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
        "500": { $ref: "#/components/responses/ServerError" }

  /users/register:
    post:
      tags: ["Users"]
      summary: "ユーザー登録"
      description: "新規ユーザー登録"
      operationId: "createUser"
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/me:
    get:
      tags: ["Users"]
      summary: "自分のユーザー情報取得"
      security:
        - AccessToken: []
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/{id}:
    get:
      tags: ["Users"]
      summary: "ユーザー情報取得"
      operationId: "getUser"
      security:
        - AccessToken: []
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/update/{id}:
    put:
      tags: ["Users"]
      summary: "ユーザー情報更新"
      operationId: "updateUser"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/delete/{id}:
    delete:
      tags: ["Users"]
      summary: "ユーザー削除"
      operationId: "deleteUser"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      responses:
        "204":
          description: "削除成功"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps:
    get:
      tags: ["Maps"]
      summary: "地図一覧取得（直下の children 付き）"
      description: "現在利用可能な地図メタ情報一覧を返す。各要素は直下の children と childrenCount を同梱。"
      parameters:
        - in: "query"
          name: "page"
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: "query"
          name: "perPage"
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: "query"
          name: "isActive"
          schema:
            type: boolean
        - in: "query"
          name: "type"
          schema:
            $ref: "#/components/schemas/MapType"
      responses:
        "200":
          description: "取得成功"
          headers:
            ETag:
              schema:
                type: string
              description: "キャッシュ用ETag"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapResponse"
                  pageInfo:
                    $ref: "#/components/schemas/PageInfo"
        "500": { $ref: "#/components/responses/ServerError" }
    post:
      tags: ["Maps"]
      summary: "地図メタ作成（管理者）"
      description: "背景画像URLと自然サイズ（natural size）を登録する。画像アップロードは別レイヤ。"
      security:
        - AccessToken: []
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapCreateRequest"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/{mapId}:
    get:
      tags: ["Maps"]
      summary: "地図メタ取得（直下の children 付き）"
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    patch:
      tags: ["Maps"]
      summary: "地図メタ更新（管理者）"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/{mapId}/children:
    get:
      tags: ["Maps"]
      summary: "子マップ一覧取得（例: campus配下のarea、area配下のfloor）"
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
        - in: "query"
          name: "type"
          schema:
            $ref: "#/components/schemas/MapType"
          description: "指定時、該当タイプのみ返す"
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapResponse"
        "404": { $ref: "#/components/responses/NotFound" }

  /maps/{mapId}/pins:
    get:
      tags: ["Pins"]
      summary: "ピン一覧取得"
      description: |
        正規化座標（0〜1 の相対座標）で返す。クライアントは表示時に現在の画像サイズへ射影すること。
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
        - in: "query"
          name: "category"
          schema:
            $ref: "#/components/schemas/PinCategory"
        - in: "query"
          name: "status"
          schema:
            $ref: "#/components/schemas/PinStatus"
        - in: "query"
          name: "type"
          schema:
            $ref: "#/components/schemas/PinType"
        - in: "query"
          name: "page"
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: "query"
          name: "perPage"
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        "200":
          description: "取得成功"
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinResponse"
                  pageInfo:
                    $ref: "#/components/schemas/PageInfo"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    post:
      tags: ["Pins"]
      summary: "ピン作成（管理者/担当者）"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinCreateRequest"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /pins/{pinId}:
    get:
      tags: ["Pins"]
      summary: "ピン詳細取得"
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    patch:
      tags: ["Pins"]
      summary: "ピン情報更新（名称/説明/カテゴリ/ステータス等）"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    delete:
      tags: ["Pins"]
      summary: "ピン削除（管理者）"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "削除成功"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /pins/{pinId}/waittime:
    patch:
      tags: ["Pins"]
      summary: "待ち時間の更新（担当者用）"
      description: |
        待ち時間（分）を更新する。負値は不可。0 は待ち時間なし。
        更新は差分配信の対象となる。
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaittimeUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /pins/{pinId}/tickets:
    post:
      tags: ["Tickets"]
      summary: "整理券発行"
      description: "1回の呼び出しで1枚の整理券を発行する（v0）。"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketIssueRequest"
      responses:
        "201":
          description: "発行成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }
    get:
      tags: ["Tickets"]
      summary: "ピンに紐づく整理券一覧（担当者/管理者）"
      security:
        - AccessToken: []
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
        - in: "query"
          name: "status"
          schema:
            $ref: "#/components/schemas/TicketStatus"
        - in: "query"
          name: "page"
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: "query"
          name: "perPage"
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TicketResponse"
                  pageInfo:
                    $ref: "#/components/schemas/PageInfo"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /tickets/{ticketId}:
    get:
      tags: ["Tickets"]
      summary: "整理券詳細取得"
      parameters:
        - in: "path"
          name: "ticketId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    patch:
      tags: ["Tickets"]
      summary: "整理券の状態変更（キャンセル/使用済みチェックイン）"
      security:
        - AccessToken: []
        - CsrfToken: []
      parameters:
        - in: "path"
          name: "ticketId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /me/tickets:
    get:
      tags: ["Tickets"]
      summary: "自分の整理券一覧"
      security:
        - AccessToken: []
      parameters:
        - in: "query"
          name: "page"
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: "query"
          name: "perPage"
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TicketResponse"
                  pageInfo:
                    $ref: "#/components/schemas/PageInfo"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /realtime/wait-times:
    get:
      tags: ["Realtime"]
      summary: "待ち時間のSSE配信"
      description: |
        `text/event-stream` で待ち時間更新をプッシュ配信する。
        イベントタイプは `waittime.update`。Last-Event-ID に対応。
      parameters:
        - in: "query"
          name: "mapId"
          required: true
          schema:
            type: string
        - in: "header"
          name: "Last-Event-ID"
          schema:
            type: string
      responses:
        "200":
          description: "ストリーム開始"
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 1718861000000
                  event: waittime.update
                  data: {"pinId":"pin_123","waitMinutes":25,"updatedAt":"2025-09-27T03:00:00Z"}
        "400": { $ref: "#/components/responses/BadRequest" }

components:
  securitySchemes:
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: "JWT"
    RefreshCookie:
      type: apiKey
      in: cookie
      name: "rt"
    CsrfToken:
      type: apiKey
      in: header
      name: "X-CSRF-Token"

  responses:
    BadRequest:
      description: "入力値不正エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: "認証情報不正エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: "権限不足エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: "競合エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "対象が存在しない"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: "サーバ内部エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: ["message"]

    PageInfo:
      type: object
      properties:
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 50
        total:
          type: integer
          example: 123
      required: ["page", "perPage", "total"]

    CsrfResponse:
      type: object
      properties:
        csrf_token:
          type: string
      required: ["csrf_token"]

    LoginRequest:
      type: object
      required: ["username", "password"]
      properties:
        username:
          type: string
          description: "ログインID"
          example: "kitano_masaki"
        password:
          type: string
          format: password
          description: "ログイン用パスワード"
          example: "Passw0rd!123"

    TokenResponse:
      type: object
      required: ["access_token", "access_expires_at"]
      properties:
        access_token:
          type: string
          description: "アクセスJWT"
        access_expires_at:
          type: string
          format: date-time
          description: "アクセスJWTの有効期限"

    UserCreateRequest:
      type: object
      required: ["username", "password"]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: "kitano_masaki"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          example: "Passw0rd!123"

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          format: password
          minLength: 8

    UserResponse:
      type: object
      required: ["id", "username"]
      properties:
        id:
          type: string
          example: "usr_12345"
        username:
          type: string
          example: "kitano_masaki"
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    MapType:
      type: string
      enum: ["campus", "area", "floor"]
      example: "campus"

    MapChildRef:
      type: object
      description: "子マップの軽量参照"
      required: ["id", "type", "name"]
      properties:
        id:
          type: string
          example: "map_01JCHILD01"
        type:
          $ref: "#/components/schemas/MapType"
        name:
          type: string
          example: "講義棟エリア"
        hasFloors:
          type: boolean
          description: "子が area の場合のヒント: その配下に floor を持つか"

    MapResponse:
      type: object
      required:
        ["id","name","imageUrl","naturalWidth","naturalHeight","version","isActive","type","createdAt","modifiedAt"]
      properties:
        id:
          type: string
          example: "map_01HZXABCDE"
        name:
          type: string
          example: "2025 技大祭メインマップ"
        imageUrl:
          type: string
          format: uri
        naturalWidth:
          type: integer
          minimum: 1
          example: 4096
        naturalHeight:
          type: integer
          minimum: 1
          example: 3072
        version:
          type: string
          example: "v1.0.0"
        isActive:
          type: boolean
          example: true
        type:
          $ref: "#/components/schemas/MapType"
        parentMapId:
          type: string
          nullable: true
          description: "親マップのID（area→campus, floor→area）"
        hasFloors:
          type: boolean
          description: "このマップ（通常 area）が複数フロアを持つか"
          example: true
        childrenCount:
          type: integer
          description: "直下の子マップ数"
          example: 3
        children:
          type: array
          description: "直下の子マップ一覧（常に同梱。空配列の可能性あり）"
          items:
            $ref: "#/components/schemas/MapChildRef"
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    MapCreateRequest:
      type: object
      required: ["name","imageUrl","naturalWidth","naturalHeight","version","type"]
      properties:
        name:
          type: string
        imageUrl:
          type: string
          format: uri
        naturalWidth:
          type: integer
          minimum: 1
        naturalHeight:
          type: integer
          minimum: 1
        version:
          type: string
        isActive:
          type: boolean
          default: true
        type:
          $ref: "#/components/schemas/MapType"
        parentMapId:
          type: string
          nullable: true
        hasFloors:
          type: boolean
          default: false

    MapUpdateRequest:
      type: object
      properties:
        name:
          type: string
        imageUrl:
          type: string
          format: uri
        naturalWidth:
          type: integer
          minimum: 1
        naturalHeight:
          type: integer
          minimum: 1
        version:
          type: string
        isActive:
          type: boolean
        type:
          $ref: "#/components/schemas/MapType"
        parentMapId:
          type: string
          nullable: true
        hasFloors:
          type: boolean

    PinType:
      type: string
      enum: ["area_selector","exhibit","service","info"]
      example: "area_selector"

    PinCategory:
      type: string
      enum: ["food","stage","exhibition","game","service","other"]
      example: "food"

    PinStatus:
      type: string
      enum: ["open","paused","closed"]
      example: "open"

    PinResponse:
      type: object
      required:
        ["id","mapId","name","xNorm","yNorm","category","status","waitMinutes","createdAt","modifiedAt"]
      properties:
        id:
          type: string
          example: "pin_01J0AABCDE"
        mapId:
          type: string
          example: "map_01HZXABCDE"
        name:
          type: string
          example: "ラーメン研究会"
        description:
          type: string
          example: "自家製スープの限定提供"
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
          description: "type=area_selector の場合に必須。遷移先のエリア/フロアの Map ID"
        xNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.3125
          description: "画像左上(0,0)〜右下(1,1)の正規化X座標"
        yNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.742
          description: "画像左上(0,0)〜右下(1,1)の正規化Y座標"
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"
        waitMinutes:
          type: integer
          minimum: 0
          example: 20
        icon:
          type: string
          description: "表示用アイコン種別（任意）"
          example: "ramen"
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    PinCreateRequest:
      type: object
      required: ["name","xNorm","yNorm","category"]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
        xNorm:
          type: number
          minimum: 0
          maximum: 1
        yNorm:
          type: number
          minimum: 0
          maximum: 1
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"
          default: "open"
        icon:
          type: string
        waitMinutes:
          type: integer
          minimum: 0
          default: 0

    PinUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
        xNorm:
          type: number
          minimum: 0
          maximum: 1
        yNorm:
          type: number
          minimum: 0
          maximum: 1
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"
        icon:
          type: string

    WaittimeUpdateRequest:
      type: object
      required: ["waitMinutes"]
      properties:
        waitMinutes:
          type: integer
          minimum: 0
          example: 35
        note:
          type: string
          maxLength: 200
          description: "運用メモ（任意、監査ログ用）"

    TicketStatus:
      type: string
      enum: ["issued","used","cancelled","expired"]
      example: "issued"

    TicketResponse:
      type: object
      required: ["id","pinId","status","code","issuedAt","expiresAt"]
      properties:
        id:
          type: string
          example: "tkt_01J0BABCDE"
        pinId:
          type: string
          example: "pin_01J0AABCDE"
        userId:
          type: string
          nullable: true
          description: "認証ユーザーに紐づく場合のみ設定"
        status:
          $ref: "#/components/schemas/TicketStatus"
        code:
          type: string
          example: "NTF-7G2Q-9K1X"
          description: "入場時照合用コード（クライアント側でQR化可）"
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true

    TicketIssueRequest:
      type: object
      properties:
        expiresInMinutes:
          type: integer
          minimum: 5
          maximum: 1440
          default: 180
          description: "有効期限（分）。指定なしは既定値。"
        bindToUser:
          type: boolean
          default: true
          description: "認証ユーザーに紐付けるか"

    TicketUpdateRequest:
      type: object
      required: ["op"]
      properties:
        op:
          type: string
          enum: ["cancel","checkin"]
          description: "cancel=キャンセル、checkin=使用済みにする"
        note:
          type: string
          maxLength: 200
