openapi: 3.1.0
info:
  title: "nutfesmap 技大祭マップ API"
  version: "0.4.0"
  description: |
    技大祭マップサービスAPI。

    ■ 現仕様
    - 全エンドポイントは認証不要（公開）です。
    - Auth系エンドポイントは将来利用のため仕様として残していますが、呼び出し時の認証要件はありません。

servers:
  - url: "http://localhost:8080"
    description: "ローカル開発用サーバ"
  - url: "http://localhost:8080/api"
    description: "/api プレフィックスを付ける構成の場合（必要に応じてパスも合わせる）"

tags:
  - name: "Auth"
    description: "認証関連API（現在は未使用だが仕様は保持）"
  - name: "Users"
    description: "ユーザー関連API"
  - name: "Maps"
    description: "地図（背景画像メタ／階層: campus→area→floor）関連API"
  - name: "Pins"
    description: "地図上のピン（企画・エリア選択など）関連API"

paths:
  /auth/login:
    post:
      tags: ["Auth"]
      summary: "ユーザーログイン"
      description: |
        ユーザーを認証し、アクセスJWTを返却。リフレッシュトークンは HttpOnly Cookie `rt` に設定されます。
        現仕様では呼び出し時の認証・CSRFチェックは不要。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "認証成功"
          headers:
            Set-Cookie:
              description: "HttpOnly refresh token cookie (rt)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/refresh:
    post:
      tags: ["Auth"]
      summary: "アクセストークン再発行"
      description: |
        有効なリフレッシュトークンCookieを用いてアクセストークンを再発行し、リフレッシュトークンもローテーションします。
        現仕様では呼び出し時の認証・CSRFチェックは不要。
      responses:
        "200":
          description: "再発行成功"
          headers:
            Set-Cookie:
              description: "Rotated HttpOnly refresh token cookie (rt)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "ログアウト"
      description: |
        リフレッシュトークンを無効化し、Cookieを削除します。
        現仕様では呼び出し時の認証・CSRFチェックは不要。
      responses:
        "204":
          description: "ログアウト成功（No Content）"
          headers:
            Set-Cookie:
              description: "クリアされたリフレッシュトークンCookie"
              schema:
                type: string
        "500": { $ref: "#/components/responses/ServerError" }

  /auth/csrf:
    get:
      tags: ["Auth"]
      summary: "CSRFトークン取得"
      description: "CSRFトークンを返却（現仕様では必須ではありません）。"
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
        "500": { $ref: "#/components/responses/ServerError" }

  /users/register:
    post:
      tags: ["Users"]
      summary: "ユーザー登録"
      description: "新規ユーザー登録（認証・CSRF不要）。"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/me:
    get:
      tags: ["Users"]
      summary: "自分のユーザー情報取得（認証不要のダミー想定可）"
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/{id}:
    get:
      tags: ["Users"]
      summary: "ユーザー情報取得"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/update/{id}:
    put:
      tags: ["Users"]
      summary: "ユーザー情報更新（認証・CSRF不要）"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /users/delete/{id}:
    delete:
      tags: ["Users"]
      summary: "ユーザー削除（認証・CSRF不要）"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "ユーザー識別子"
          schema:
            type: string
      responses:
        "204":
          description: "削除成功"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/index:
    get:
      tags: ["Maps"]
      summary: "Index Map取得（親なしMapのみ）"
      description: "parentMapId が null の Map を返す（キャンパスなど最上位）。画面初期表示用。"
      responses:
        "200":
          description: "取得成功"
          headers:
            ETag:
              schema:
                type: string
              description: "キャッシュ用ETag"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapResponse"

  /maps:
    post:
      tags: ["Maps"]
      summary: "地図メタ作成（管理者）"
      description: "背景画像（base64）と自然サイズ（natural size）を登録する。"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapCreateRequest"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/{mapId}:
    get:
      tags: ["Maps"]
      summary: "地図メタ取得（直下の children 付き）"
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    patch:
      tags: ["Maps"]
      summary: "地図メタ更新（管理者）"
      description: "必要フィールドのみ部分更新。"
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    delete:
      tags: ["Maps"]
      summary: "地図メタ削除（再帰的に子マップ・ピンも削除）"
      description: |
        指定した Map を **ON DELETE CASCADE** 相当で削除します。
        その配下の **子マップ（再帰）** と **各マップに紐づく全ピン** も同時に削除します。
        実装はDBの外部キー `ON DELETE CASCADE` またはアプリ層の再帰削除のいずれでも可。
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "削除成功（No Content。配下も含めて削除済み）"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /maps/{mapId}/pins:
    get:
      tags: ["Pins"]
      summary: "ピン一覧取得（該当Mapの全件）"
      description: |
        指定 Map に属する全ピンを返す。正規化座標（0〜1）の相対座標を返すため、
        クライアントは表示時に現在の画像サイズへ射影すること。
      parameters:
        - in: "path"
          name: "mapId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功（全件）"
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    post:
      tags: ["Pins"]
      summary: "ピン作成（管理者/担当者）"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinCreateRequest"
      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/ServerError" }

  /pins/{pinId}:
    get:
      tags: ["Pins"]
      summary: "ピン詳細取得"
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    patch:
      tags: ["Pins"]
      summary: "ピン情報更新（名称/説明/カテゴリ/ステータス等）"
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinUpdateRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
    delete:
      tags: ["Pins"]
      summary: "ピン削除（管理者）"
      parameters:
        - in: "path"
          name: "pinId"
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "削除成功"
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

components:
  securitySchemes:
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: "JWT"
    RefreshCookie:
      type: apiKey
      in: cookie
      name: "rt"
    CsrfToken:
      type: apiKey
      in: header
      name: "X-CSRF-Token"

  responses:
    BadRequest:
      description: "入力値不正エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: "認証情報不正エラー（将来用。現時点では未使用）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: "権限不足エラー（将来用。現時点では未使用）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: "競合エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "対象が存在しない"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: "サーバ内部エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    PageInfo:
      type: object
      properties:
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 50
        total:
          type: integer
          example: 123
      required:
        - page
        - perPage
        - total

    CsrfResponse:
      type: object
      properties:
        csrf_token:
          type: string
      required:
        - csrf_token

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: "ログインID"
          example: "kitano_masaki"
        password:
          type: string
          format: password
          description: "ログイン用パスワード"
          example: "Passw0rd!123"

    TokenResponse:
      type: object
      required:
        - access_token
        - access_expires_at
      properties:
        access_token:
          type: string
          description: "アクセスJWT"
        access_expires_at:
          type: string
          format: date-time
          description: "アクセスJWTの有効期限"

    # --- Map関連（imageData & floorCount、version/isActive/type なし） ---
    MapChildRef:
      type: object
      description: "子マップの軽量参照"
      required:
        - id
        - name
      properties:
        id:
          type: string
          example: "map_01JCHILD01"
        name:
          type: string
          example: "講義棟エリア"
        hasFloors:
          type: boolean
          description: "その配下に floor を持つか"
          example: true
        floorCount:
          type: integer
          minimum: 0
          description: "フロア数（floor 未導入の階層では 0 もあり得る）"
          example: 3

    MapResponse:
      type: object
      required:
        - id
        - name
        - imageData
        - naturalWidth
        - naturalHeight
        - parentMapId
        - hasFloors
        - floorCount
        - childrenCount
        - children
        - createdAt
        - modifiedAt
      properties:
        id:
          type: string
          example: "map_01HZXABCDE"
        name:
          type: string
          example: "2025 技大祭メインマップ"
        imageData:
          type: string
          format: byte
          description: "背景画像のbase64エンコード文字列"
        naturalWidth:
          type: integer
          minimum: 1
          example: 4096
        naturalHeight:
          type: integer
          minimum: 1
          example: 3072
        parentMapId:
          type: string
          nullable: true
          description: "親マップのID（area→campus, floor→area）"
        hasFloors:
          type: boolean
          description: "このマップが複数フロアを持つか"
          example: true
        floorCount:
          type: integer
          minimum: 0
          description: "階数（hasFloors=true の場合は 1 以上）"
          example: 3
        childrenCount:
          type: integer
          description: "直下の子マップ数"
          example: 3
        children:
          type: array
          description: "直下の子マップ一覧（常に同梱。空配列の可能性あり）"
          items:
            $ref: "#/components/schemas/MapChildRef"
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    MapCreateRequest:
      type: object
      required:
        - name
        - imageData
        - naturalWidth
        - naturalHeight
      properties:
        name:
          type: string
        imageData:
          type: string
          format: byte
          description: "背景画像のbase64エンコード文字列"
        naturalWidth:
          type: integer
          minimum: 1
        naturalHeight:
          type: integer
          minimum: 1
        parentMapId:
          type: string
          nullable: true
        hasFloors:
          type: boolean
          default: false
        floorCount:
          type: integer
          minimum: 0
          default: 0
          description: "hasFloors=true の場合は 1 以上を推奨"

    MapUpdateRequest:
      type: object
      properties:
        name:
          type: string
        imageData:
          type: string
          format: byte
          description: "背景画像のbase64エンコード文字列（差し替え時のみ）"
        naturalWidth:
          type: integer
          minimum: 1
        naturalHeight:
          type: integer
          minimum: 1
        parentMapId:
          type: string
          nullable: true
        hasFloors:
          type: boolean
        floorCount:
          type: integer
          minimum: 0

    # --- Pin関連（説明画像のbase64を追加） ---
    PinType:
      type: string
      enum: ["area_selector","exhibit","service","info"]
      example: "area_selector"

    PinCategory:
      type: string
      enum: ["food","stage","exhibition","game","service","other"]
      example: "food"

    PinStatus:
      type: string
      enum: ["open","paused","closed"]
      example: "open"

    PinResponse:
      type: object
      required:
        - id
        - mapId
        - name
        - xNorm
        - yNorm
        - category
        - status
        - waitMinutes
        - createdAt
        - modifiedAt
      properties:
        id:
          type: string
          example: "pin_01J0AABCDE"
        mapId:
          type: string
          example: "map_01HZXABCDE"
        name:
          type: string
          example: "ラーメン研究会"
        description:
          type: string
          example: "自家製スープの限定提供"
        descriptionImageData:
          type: string
          format: byte
          nullable: true
          description: "説明用画像のbase64エンコード文字列"
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
          description: "type=area_selector の場合に必須。遷移先のエリア/フロアの Map ID"
        xNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.3125
          description: "画像左上(0,0)〜右下(1,1)の正規化X座標"
        yNorm:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.742
          description: "画像左上(0,0)〜右下(1,1)の正規化Y座標"
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"
        waitMinutes:
          type: integer
          minimum: 0
          example: 20
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    PinCreateRequest:
      type: object
      required:
        - name
        - xNorm
        - yNorm
        - category
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        descriptionImageData:
          type: string
          format: byte
          nullable: true
          description: "説明用画像のbase64エンコード文字列"
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
        xNorm:
          type: number
          minimum: 0
          maximum: 1
        yNorm:
          type: number
          minimum: 0
          maximum: 1
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"
          default: "open"
        waitMinutes:
          type: integer
          minimum: 0
          default: 0

    PinUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        descriptionImageData:
          type: string
          format: byte
          nullable: true
          description: "説明用画像のbase64エンコード文字列（差し替え時のみ）"
        type:
          $ref: "#/components/schemas/PinType"
        linkToMapId:
          type: string
          nullable: true
        xNorm:
          type: number
          minimum: 0
          maximum: 1
        yNorm:
          type: number
          minimum: 0
          maximum: 1
        category:
          $ref: "#/components/schemas/PinCategory"
        status:
          $ref: "#/components/schemas/PinStatus"

    WaittimeUpdateRequest:
      type: object
      required:
        - waitMinutes
      properties:
        waitMinutes:
          type: integer
          minimum: 0
          example: 35
        note:
          type: string
          maxLength: 200
          description: "運用メモ（任意、監査ログ用）"
