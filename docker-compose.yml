# docker-compose.yml (dev)
services:
  nutfesmap-database:
    image: mysql:8.0
    container_name: nutfesmap-database
    env_file: services/nutfesmap-api/config/.env.dev          # ← dev用
    command: --default-authentication-plugin=mysql_native_password
    ports: ["3306:3306"]
    volumes:
      - db_data:/var/lib/mysql
      - ./services/nutfesmap-api/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  nutfesmap-migrate:
    image: migrate/migrate:v4.17.0
    container_name: nutfesmap-migrate
    depends_on:
      nutfesmap-database:
        condition: service_healthy
    env_file: services/nutfesmap-api/config/.env.dev          # ← dev用
    volumes:
      - ./services/nutfesmap-api/migrations:/migrations:ro
      - ./services/nutfesmap-api/scripts/migrate.sh:/scripts/migrate.sh:ro
    entrypoint: ["/bin/sh","-c","/scripts/migrate.sh"]
    restart: "no"

  nutfesmap-api:
    build:
      context: .
      dockerfile: services/nutfesmap-api/build/Dockerfile
    container_name: nutfesmap-api
    env_file: services/nutfesmap-api/config/.env.dev          # ← dev用
    ports: ["8080:8080"]
    depends_on:
      nutfesmap-database:
        condition: service_healthy
      nutfesmap-migrate:
        condition: service_completed_successfully

  nutfesmap-api-document:
    image: swaggerapi/swagger-ui:latest
    container_name: nutfesmap-api-document
    ports: ["9419:8080"]
    environment:
      SWAGGER_JSON: /swagger.yaml
    volumes:
      - ./services/nutfesmap-api/api/swagger.yaml:/swagger.yaml:ro
    depends_on:
      - nutfesmap-api

  nutfesmap-web:
    build:
      context: ./services/nutfesmap-web
      dockerfile: Dockerfile
      target: dev                                          # ← devステージ
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}  # ← dev root .env から注入
    container_name: nutfesmap-web
    env_file: services/nutfesmap-web/.env.dev              # ← dev用（ランタイム）
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports: ["3000:3000"]
    volumes:
      - ./services/nutfesmap-web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- -H 0.0.0.0
    depends_on:
      - nutfesmap-api

volumes:
  db_data:
