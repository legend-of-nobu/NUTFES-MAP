services:
  nutfesmap-database:
    image: mysql:8.0
    container_name: nutfesmap-database
    env_file: services/nutfesmap-api/config/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./services/nutfesmap-api/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  nutfesmap-migrate:
    image: migrate/migrate:v4.17.0
    container_name: nutfesmap-migrate
    depends_on:
      nutfesmap-database:
        condition: service_healthy
    env_file: services/nutfesmap-api/config/.env
    volumes:
      - ./services/nutfesmap-api/migrations:/migrations:ro
      - ./services/nutfesmap-api/scripts/migrate.sh:/scripts/migrate.sh:ro
    entrypoint: ["/bin/sh","-c","/scripts/migrate.sh"]
    restart: "no"

  nutfesmap-api:
    build:
      context: .
      dockerfile: services/nutfesmap-api/build/Dockerfile
    container_name: nutfesmap-api
    env_file: services/nutfesmap-api/config/.env
    ports:
      - "8080:8080"
    depends_on:
      nutfesmap-database:
        condition: service_healthy
      nutfesmap-migrate:
        condition: service_completed_successfully

  nutfesmap-api-document:
    image: swaggerapi/swagger-ui:latest
    container_name: nutfesmap-api-document
    ports:
      - "9419:8080"
    environment:
      SWAGGER_JSON: /swagger.yaml
    volumes:
      - ./services/nutfesmap-api/api/swagger.yaml:/swagger.yaml:ro
    depends_on:
      - nutfesmap-api

  nutfesmap-web:
    build:
      context: ./services/nutfesmap-web
      dockerfile: Dockerfile
      target: dev           # ← devステージで next dev を動かす
    container_name: nutfesmap-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: "https://api.navifes.com"
      API_INTERNAL_BASE_URL: "http://nutfesmap-api:8080"
      # 変更検知を安定化
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./services/nutfesmap-web:/app   # ソースをマウント（必須）
      - /app/node_modules               # コンテナ側を維持
      - /app/.next                      # ビルドキャッシュをコンテナ側に
    command: npm run dev -- -H 0.0.0.0
    depends_on:
      - nutfesmap-api

  cloudflared:
    image: cloudflare/cloudflared:2025.8.0
    container_name: cloudflared
    depends_on:
      - nutfesmap-web
      - nutfesmap-api
    volumes:
      - ./services/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./services/cloudflared/76614e39-6ea4-431e-a84c-571235b83321.json:/etc/cloudflared/76614e39-6ea4-431e-a84c-571235b83321.json:ro
    environment:
      - TUNNEL_TOKEN=   # 未使用（named tunnel運用のため）
      - CLOUDFLARE_TUNNEL_ID=76614e39-6ea4-431e-a84c-571235b83321
    command: tunnel run
    restart: unless-stopped

volumes:
  db_data:
